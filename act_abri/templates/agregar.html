{% extends "base.html" %}
{% block titulo %}Agregar Tarea{% endblock %}

{% block contenido %}

<div class="container mt-5">

  <h2 class="text-center mb-4" style="color:#ff7eb3;">
    ➕ Agregar Tarea agregar tarea 233
  </h2>

  <form method="POST" action="{{ url_for('agregartarea') }}">

    <div class="mb-3">
      <label class="form-label">Nombre de la tarea</label>
      <input type="text" name="nombre" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea name="descripcion" class="form-control"></textarea>
    </div>

    <button class="btn" style="background:#ff7eb3; color:white;">
      Guardar
    </button>

  </form>

</div>

{% endblock %}
